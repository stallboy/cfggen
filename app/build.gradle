plugins {
    id 'application'
    id 'jacoco'
    id 'gg.jte.gradle' version '3.2.1'
}

group = 'cfggen'
version = '1.0.0'

repositories {
    mavenCentral()
}

// 将版本号统一管理，方便后续升级
def versions = [
        fastjson2: '2.0.62',
        poi      : '5.5.1',
        fastexcel: '0.19.0',
        antlr    : '4.13.2'
]

dependencies {
    // 核心业务依赖
    implementation "org.antlr:antlr4-runtime:${versions.antlr}"
    implementation "gg.jte:jte:3.2.1"
    implementation "org.apache.poi:poi:${versions.poi}"
    implementation "org.apache.poi:poi-ooxml:${versions.poi}"
    implementation 'org.apache.commons:commons-text:1.15.0'

    implementation "org.dhatim:fastexcel:${versions.fastexcel}"
    implementation "org.dhatim:fastexcel-reader:${versions.fastexcel}"
    implementation 'de.siegmar:fastcsv:4.3.1' // 4.x：CsvRow→CsvRecord、skipEmptyRows→skipEmptyLines、build→ofCsvRecord
    implementation "com.alibaba.fastjson2:fastjson2:${versions.fastjson2}"

    implementation 'io.github.sashirestela:simple-openai:3.21.0'
    implementation 'io.github.codeboyzhou:mcp-declarative-java-sdk:0.9.0'

    // 测试依赖
    testImplementation 'org.junit.jupiter:junit-jupiter:5.12.2'
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

// JTE 模板预编译：构建期把 .jte 生成 .java 并与应用代码一起编译进 jar，
// 运行时通过 TemplateEngine.createPrecompiled 直接加载 class，省去每次启动的模板编译开销（~1.6s）
jte {
    sourceDirectory = file('src/main/resources/jte').toPath()
    generate()
    contentType = 'Plain'
    trimControlStructures = true
}

// 保证 jte 模板行尾为 LF：jte 预编译按字节读取模板，模板里的 CRLF 会原样透传到生成的代码文件。
// 无论工作区行尾如何，构建时强制把所有 .jte 规范化为 LF，确保打进 jar 的模板与编译进 class 的字面文本一致。
// （原地修改源文件；因 .gitattributes 为 eol=lf，git 不会因此报 modified。）
tasks.register('normalizeJteLineEndings') {
    group = 'build'
    description = '把 src/main/resources/jte 下所有 .jte 的行尾统一为 LF'
    // 配置阶段解析路径并捕获为局部变量；configuration cache 下 doLast 不能再引用 Project（file(...) 等）
    def jteRoot = file('src/main/resources/jte')
    doLast {
        def changed = 0
        jteRoot.eachFileRecurse { f ->
            if (f.isFile() && f.name.endsWith('.jte')) {
                def content = f.getText('UTF-8')
                def normalized = content.replaceAll('\r\n', '\n').replaceAll('\r', '\n')
                if (content != normalized) {
                    f.write(normalized, 'UTF-8')
                    changed++
                    println "[normalizeJteLineEndings] -> LF: ${jteRoot.toPath().relativize(f.toPath())}"
                }
            }
        }
        println "[normalizeJteLineEndings] 完成，共转换 ${changed} 个 .jte 为 LF"
    }
}

tasks.named('generateJte') { dependsOn 'normalizeJteLineEndings' }
tasks.named('processResources') { dependsOn 'normalizeJteLineEndings' }

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// 统一配置编译参数
tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
}

application {
    mainClass = 'configgen.gen.Main'
    // 抑制 fastjson2 调用 sun.misc.Unsafe 内存方法时 JDK 25 的弃用警告（JEP 471）
    applicationDefaultJvmArgs = ["--sun-misc-unsafe-memory-access=allow"]
}

jar {
    manifest {
        attributes 'Main-Class': 'configgen.gen.Main'
    }
}

/**
 * 改进后的 FatJar 任务
 * 1. 自动包含 copyGenJavaSources 的输出
 * 2. 排除依赖包中的签名文件，防止 SecurityException
 */
tasks.register('fatJar', Jar) {
    group = 'build'
    description = '构建包含所有依赖的的可执行 JAR'
    archiveFileName = 'cfggen.jar'

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // 包含主程序编译输出
    from sourceSets.main.output

    // 包含所有运行时依赖的解压内容
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    } {
        // 必须排除这些签名文件，否则 java -jar 运行时会报错
        exclude "META-INF/*.SF"
        exclude "META-INF/*.DSA"
        exclude "META-INF/*.RSA"
    }

    manifest.from jar.manifest
}

/**
 * 改进后的资源拷贝任务
 * 使用 layout.buildDirectory 替代硬编码路径
 */
tasks.register('copyGenJavaSources', Copy) {
    description = '复制模板源码到 resources 目录供运行时调用'

    from('src/main/java/configgen/genjava') {
        include 'Schema.java',
                'SchemaBean.java',
                'SchemaCompatibleException.java',
                'SchemaEnum.java',
                'SchemaInterface.java',
                'SchemaList.java',
                'SchemaMap.java',
                'SchemaPrimitive.java',
                'SchemaRef.java',
                'SchemaDeserializer.java',
                'ConfigErr.java',
                'ConfigInput.java',
                'BytesInspector.java'
    }
    // 打包后的路径：support/configgen/genjava/
    into layout.buildDirectory.dir("resources/main/support/configgen/genjava")
}

// 挂载任务依赖链
tasks.named('processResources') {
    dependsOn copyGenJavaSources
}

tasks.named('fatJar') {
    dependsOn copyGenJavaSources
}

// 测试与覆盖率配置
tasks.named('test') {
    useJUnitPlatform()
    // 抑制 fastjson2 的 sun.misc.Unsafe 弃用警告（同 applicationDefaultJvmArgs）
    jvmArgs '--sun-misc-unsafe-memory-access=allow'
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        csv.required = true
        xml.required = true
        html.outputLocation = layout.buildDirectory.dir('jacocoHtml')
    }
}