plugins {
    id 'application'
    id 'jacoco'
}

group = 'cfggen'
version = '1.0.0'

repositories {
    mavenCentral()
}

// 将版本号统一管理，方便后续升级
def versions = [
        poi      : '5.5.1',
        fastexcel: '0.19.0',
        antlr    : '4.13.2'
]

dependencies {
    // 核心业务依赖
    implementation "org.antlr:antlr4-runtime:${versions.antlr}"
    implementation "gg.jte:jte:3.2.1"
    implementation "org.apache.poi:poi:${versions.poi}"
    implementation "org.apache.poi:poi-ooxml:${versions.poi}"
    implementation 'org.apache.commons:commons-text:1.15.0'

    implementation "org.dhatim:fastexcel:${versions.fastexcel}"
    implementation "org.dhatim:fastexcel-reader:${versions.fastexcel}"
    implementation 'de.siegmar:fastcsv:4.3.1' // 4.x：CsvRow→CsvRecord、skipEmptyRows→skipEmptyLines、build→ofCsvRecord
    // SIMD 加速 JSON 解析；运行/测试需 --add-modules jdk.incubator.vector（见 applicationDefaultJvmArgs 与 test.jvmArgs）
    implementation 'org.simdjson:simdjson-java:0.4.0'

    implementation 'io.github.sashirestela:simple-openai:3.21.0'
    implementation 'io.github.codeboyzhou:mcp-declarative-java-sdk:0.9.0'

    // 测试依赖
    testImplementation 'org.junit.jupiter:junit-jupiter:5.12.2'
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

java {
    toolchain {
        // simdjson-java 0.4.0 需要 JDK 24+（其字节码为 class version 68），故升至 25
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// 统一配置编译参数
tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
}

application {
    mainClass = 'configgen.gen.Main'
    // simdjson-java 依赖孵化器模块 jdk.incubator.vector，运行时必须显式加入模块图，否则 NoClassDefFoundError
    applicationDefaultJvmArgs = ["--add-modules", "jdk.incubator.vector"]
}

jar {
    manifest {
        attributes 'Main-Class': 'configgen.gen.Main'
    }
}

/**
 * 改进后的 FatJar 任务
 * 1. 自动包含 copyGenJavaSources 的输出
 * 2. 排除依赖包中的签名文件，防止 SecurityException
 */
tasks.register('fatJar', Jar) {
    group = 'build'
    description = '构建包含所有依赖的的可执行 JAR'
    archiveFileName = 'cfggen.jar'

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // 包含主程序编译输出
    from sourceSets.main.output

    // 包含所有运行时依赖的解压内容
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    } {
        // 必须排除这些签名文件，否则 java -jar 运行时会报错
        exclude "META-INF/*.SF"
        exclude "META-INF/*.DSA"
        exclude "META-INF/*.RSA"
    }

    manifest.from jar.manifest
}

/**
 * 改进后的资源拷贝任务
 * 使用 layout.buildDirectory 替代硬编码路径
 */
tasks.register('copyGenJavaSources', Copy) {
    description = '复制模板源码到 resources 目录供运行时调用'

    from('src/main/java/configgen/genjava') {
        include 'Schema.java',
                'SchemaBean.java',
                'SchemaCompatibleException.java',
                'SchemaEnum.java',
                'SchemaInterface.java',
                'SchemaList.java',
                'SchemaMap.java',
                'SchemaPrimitive.java',
                'SchemaRef.java',
                'SchemaDeserializer.java',
                'ConfigErr.java',
                'ConfigInput.java',
                'BytesInspector.java'
    }
    // 打包后的路径：support/configgen/genjava/
    into layout.buildDirectory.dir("resources/main/support/configgen/genjava")
}

// 挂载任务依赖链
tasks.named('processResources') {
    dependsOn copyGenJavaSources
}

tasks.named('fatJar') {
    dependsOn copyGenJavaSources
}

// 测试与覆盖率配置
tasks.named('test') {
    useJUnitPlatform()
    // 单测同样需要孵化器模块（解析层用到了 simdjson）
    jvmArgs '--add-modules', 'jdk.incubator.vector'
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        csv.required = true
        xml.required = true
        html.outputLocation = layout.buildDirectory.dir('jacocoHtml')
    }
}